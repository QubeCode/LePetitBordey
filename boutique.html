<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Boutique — Le Petit Bordey</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./dark-mode.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="index.html"><img src="images/logo.svg" alt="Le Petit Bordey" class="logo-img"/></a>
      <nav class="main-nav" aria-label="Navigation principale">
        <a href="index.html#products">Produits</a>
        <a href="boutique.html">Boutique</a>
        <a href="index.html#values">Nos valeurs</a>
        <a href="index.html#contact">Contact</a>
      </nav>
      <div class="header-actions">
        <button id="cart-toggle" aria-label="Voir le panier" class="cart-btn">Panier (<span id="cart-count">0</span>)</button>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="wrap">
        <h1>La Boutique</h1>
        <p class="muted">Filtrez, parcourez et commandez nos produits artisanaux.</p>

        <div class="shop-intro">
          <label class="search">Rechercher <input id="search" type="search" placeholder="Ex : boudin, piment"></label>
        </div>

        <div id="shop-grid" class="product-grid" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <aside id="cart" class="cart" aria-hidden="true">
    <div class="cart-header">
      <h3>Panier</h3>
      <button id="cart-close" aria-label="Fermer le panier">✕</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer">
      <div class="total">Total: <strong id="cart-total">0€</strong></div>
      <button id="checkout" class="btn primary">Passer la commande</button>
    </div>
  </aside>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <div class="brand-col"><div class="logo">Le Petit Bordey</div><p class="muted">Tradition • Famille • Artisanat</p></div>
      <nav class="foot-nav"><a href="index.html#about">Notre Histoire</a><a href="index.html#products">Produits</a></nav>
      <div class="legal"><a href="#">Mentions légales</a><a href="#">Politique de confidentialité</a></div>
    </div>
  </footer>

  <button class="dark-mode-toggle" id="dark-toggle" aria-label="Basculer mode sombre">🌙</button>

  <script src="./script.js" defer></script>
</body>
</html>
