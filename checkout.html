<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paiement Sécurisé — Le Petit Bordey</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./dark-mode.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="index.html">
        <img src="logopetitbordey.png" alt="Le Petit Bordey" class="logo-img" />
      </a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="main-nav">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" id="main-nav" aria-label="Navigation principale">
        <a href="index.html">Accueil</a>
        <a href="boutique.html">Nos produits</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <button id="cart-toggle" aria-label="Voir le panier" class="cart-btn">Panier</button>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="wrap">
        <h1>Paiement Sécurisé</h1>

        <div class="checkout-grid">
          <div class="checkout-summary">
            <h2>Résumé de commande</h2>
            <div id="order-summary" class="order-summary-box"></div>
            <div class="order-total">
              Total : <span id="total-amount">0€</span>
            </div>
          </div>

          <div class="checkout-payment">
            <h3>Formulaire de paiement</h3>
            <form id="payment-form">
              <div id="card-element" class="card-element"></div>
              <div id="card-errors" role="alert" class="card-errors"></div>
              <button type="submit" id="submit-btn" class="btn primary checkout-submit">
                Payer maintenant
              </button>
            </form>
            <p class="checkout-note">
              Clés de test Stripe — ne pas utiliser pour paiements réels.
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <div class="brand-col"><div class="logo">Le Petit Bordey</div><p class="muted">Tradition • Famille • Artisanat</p></div>
      <nav class="foot-nav"><a href="index.html#about">Notre Histoire</a><a href="boutique.html">Nos Produits</a><a href="contact.html">Contact</a></nav>
      <div class="legal"><a href="#">Mentions légales</a></div>
    </div>
  </footer>

  <button class="dark-mode-toggle" id="dark-toggle" aria-label="Basculer mode sombre">🌙</button>

  <script src="./script.js"></script>
  <script>
    const stripe = Stripe('pk_test_51234567890abcdef');
    const elements = stripe.elements();
    const cardElement = elements.create('card');
    cardElement.mount('#card-element');

    const cart = JSON.parse(localStorage.getItem('lpb_cart') || '{}');
    const PRODUCTS = window.PRODUCTS || [];

    let total = 0;
    const summary = document.getElementById('order-summary');
    Object.keys(cart).forEach(id => {
      const qty = cart[id];
      const product = PRODUCTS.find(p => p.id === id);
      if(!product) return;
      const line = document.createElement('div');
      line.className = 'order-line';
      line.innerHTML = `<span>${product.title} x${qty}</span><strong>${(product.price * qty).toFixed(2)}€</strong>`;
      summary.appendChild(line);
      total += product.price * qty;
    });
    document.getElementById('total-amount').textContent = total.toFixed(2) + '€';

    const form = document.getElementById('payment-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Traitement...';

      const { token } = await stripe.createToken(cardElement);
      if(token) {
        alert('Paiement simulé réussi !\nToken: ' + token.id + '\n\nEn production, envoyer ce token à votre serveur pour traitement.');
        localStorage.removeItem('lpb_cart');
        setTimeout(() => window.location.href = 'index.html', 2000);
      } else {
        document.getElementById('card-errors').textContent = 'Erreur lors du paiement. Vérifiez vos données.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Payer maintenant';
      }
    });

    cardElement.addEventListener('change', (event) => {
      document.getElementById('card-errors').textContent = event.error ? event.error.message : '';
    });
  </script>
</body>
</html>
